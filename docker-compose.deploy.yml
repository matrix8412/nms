services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nms}
      POSTGRES_USER: ${POSTGRES_USER:-nms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nms}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nms} -d ${POSTGRES_DB:-nms}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailhog:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${SMTP_PORT_PUBLIC:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 20s
      timeout: 5s
      retries: 5

  api:
    image: nms-app:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.app
    env_file:
      - .env
    environment:
      NODE_ENV: production
      APP_URL: ${APP_URL:-http://localhost:4200}
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://nms:nms@postgres:5432/nms?schema=public}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379}
      SMTP_HOST: ${SMTP_HOST_DOCKER:-mailhog}
      SMTP_PORT: ${SMTP_PORT_DOCKER:-1025}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-3000}:3000"
    restart: unless-stopped

  worker:
    image: nms-app:${IMAGE_TAG:-latest}
    command: ["corepack", "pnpm", "--filter", "@nms/worker", "start"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://nms:nms@postgres:5432/nms?schema=public}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

  scheduler:
    image: nms-app:${IMAGE_TAG:-latest}
    command: ["corepack", "pnpm", "--filter", "@nms/scheduler", "start"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://nms:nms@postgres:5432/nms?schema=public}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

  migrate:
    image: nms-app:${IMAGE_TAG:-latest}
    command: ["sh", "-c", "corepack pnpm db:migrate && corepack pnpm db:seed"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://nms:nms@postgres:5432/nms?schema=public}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: nms-web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT:-4200}:80"
    restart: unless-stopped

volumes:
  postgres_data:
