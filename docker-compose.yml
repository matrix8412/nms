services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: nms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nms}
      POSTGRES_USER: ${POSTGRES_USER:-nms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nms}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-nms} -d $${POSTGRES_DB:-nms}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: nms-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailhog:
    image: axllent/mailpit:latest
    container_name: nms-mailhog
    restart: unless-stopped
    ports:
      - "${SMTP_PORT_PUBLIC:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
