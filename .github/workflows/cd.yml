name: CD

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target environment
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      git_ref:
        description: Git ref to deploy (branch, tag, or commit SHA)
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: cd-${{ github.event_name == 'workflow_dispatch' && inputs.target || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.meta.outputs.commit_sha }}
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
    env:
      NODE_ENV: test
      APP_URL: http://localhost:4200
      COMPANY_EMAIL_DOMAIN: "@kinet.sk"
      DATABASE_URL: postgresql://nms:nms@localhost:5432/nms?schema=public
      REDIS_URL: redis://localhost:6379
      ENCRYPTION_KEY: dGVzdF9rZXlfMzJfYnl0ZXNfYmFzZTY0X3ZhbHVlXw==
      EMAIL_FROM: nms-ci@kinet.sk
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      SMTP_USER: ""
      SMTP_PASS: ""
      ZABBIX_URL: http://localhost/zabbix
      ZABBIX_USER: Admin
      ZABBIX_PASS: zabbix
      SYNC_CRON: "*/30 * * * *"
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.git_ref || github.sha }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm exec turbo run test --concurrency=1

      - name: Build
        run: pnpm build

      - name: Build metadata
        id: meta
        run: |
          COMMIT_SHA="$(git rev-parse HEAD)"
          echo "commit_sha=${COMMIT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=release-${COMMIT_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Package source archive
        run: |
          git archive --format=tar.gz --output release.tar.gz "${{ steps.meta.outputs.commit_sha }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: release.tar.gz
          if-no-files-found: error
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.target || (github.ref_name == 'main' && 'production' || 'staging') }}
    env:
      COMMIT_SHA: ${{ needs.build.outputs.commit_sha }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_ENV_FILE_CONTENT: ${{ secrets.DEPLOY_ENV_FILE_CONTENT }}
      COMPOSE_PROJECT_NAME: ${{ secrets.COMPOSE_PROJECT_NAME }}
      HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
      RELEASES_TO_KEEP: ${{ secrets.RELEASES_TO_KEEP }}
      AUTO_RESET_DB_ON_P3009: ${{ github.event_name == 'workflow_dispatch' && (inputs.target == 'staging' && 'true' || 'false') || (github.ref_name == 'dev' && 'true' || 'false') }}
    steps:
      - name: Check deploy secrets
        id: deploy_guard
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SSH_HOST:-}" || -z "${SSH_USER:-}" || -z "${SSH_PRIVATE_KEY:-}" || -z "${DEPLOY_PATH:-}" || -z "${DEPLOY_ENV_FILE_CONTENT:-}" ]]; then
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            echo "Required deploy secrets are missing; skipping deploy steps."
          else
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout
        if: steps.deploy_guard.outputs.ready == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.build.outputs.commit_sha }}
          fetch-depth: 0

      - name: Download release artifact
        if: steps.deploy_guard.outputs.ready == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: .

      - name: Validate required secrets
        if: steps.deploy_guard.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          : "${SSH_HOST:?Missing SSH_HOST secret}"
          : "${SSH_USER:?Missing SSH_USER secret}"
          : "${SSH_PRIVATE_KEY:?Missing SSH_PRIVATE_KEY secret}"
          : "${DEPLOY_PATH:?Missing DEPLOY_PATH secret}"
          : "${DEPLOY_ENV_FILE_CONTENT:?Missing DEPLOY_ENV_FILE_CONTENT secret}"

      - name: Configure SSH client
        if: steps.deploy_guard.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          SSH_PORT="${SSH_PORT:-22}"
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          printf "%s" "${SSH_PRIVATE_KEY}" > "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"

          if [[ -n "${SSH_KNOWN_HOSTS:-}" ]]; then
            printf "%s\n" "${SSH_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
          else
            ssh-keyscan -p "${SSH_PORT}" -H "${SSH_HOST}" >> "${HOME}/.ssh/known_hosts"
          fi
          chmod 600 "${HOME}/.ssh/known_hosts"

      - name: Upload release bundle and deploy script
        if: steps.deploy_guard.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          SSH_PORT="${SSH_PORT:-22}"
          RELEASE_ID="${COMMIT_SHA:0:12}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          REMOTE_ARCHIVE="/tmp/nms-release-${RELEASE_ID}.tar.gz"
          REMOTE_SCRIPT="/tmp/nms-remote-release-${RELEASE_ID}.sh"
          REMOTE_ENV_FILE="/tmp/nms-env-${RELEASE_ID}.env"
          LOCAL_ENV_FILE="$(mktemp)"

          echo "RELEASE_ID=${RELEASE_ID}" >> "${GITHUB_ENV}"
          echo "REMOTE_ARCHIVE=${REMOTE_ARCHIVE}" >> "${GITHUB_ENV}"
          echo "REMOTE_SCRIPT=${REMOTE_SCRIPT}" >> "${GITHUB_ENV}"
          echo "REMOTE_ENV_FILE=${REMOTE_ENV_FILE}" >> "${GITHUB_ENV}"

          chmod 600 "${LOCAL_ENV_FILE}"
          printf "%s" "${DEPLOY_ENV_FILE_CONTENT}" > "${LOCAL_ENV_FILE}"
          scp -P "${SSH_PORT}" ./release.tar.gz "${SSH_USER}@${SSH_HOST}:${REMOTE_ARCHIVE}"
          scp -P "${SSH_PORT}" ./scripts/deploy/remote-release.sh "${SSH_USER}@${SSH_HOST}:${REMOTE_SCRIPT}"
          scp -P "${SSH_PORT}" "${LOCAL_ENV_FILE}" "${SSH_USER}@${SSH_HOST}:${REMOTE_ENV_FILE}"
          rm -f "${LOCAL_ENV_FILE}"

      - name: Execute remote deployment
        if: steps.deploy_guard.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          SSH_PORT="${SSH_PORT:-22}"
          RELEASES_TO_KEEP="${RELEASES_TO_KEEP:-5}"

          quote() {
            printf "%q" "$1"
          }

          DEPLOY_PATH_Q="$(quote "${DEPLOY_PATH}")"
          DEPLOY_ENV_FILE_PATH_Q="$(quote "${REMOTE_ENV_FILE}")"
          COMPOSE_PROJECT_NAME_Q="$(quote "${COMPOSE_PROJECT_NAME}")"
          HEALTHCHECK_URL_Q="$(quote "${HEALTHCHECK_URL}")"
          RELEASES_TO_KEEP_Q="$(quote "${RELEASES_TO_KEEP}")"
          AUTO_RESET_DB_ON_P3009_Q="$(quote "${AUTO_RESET_DB_ON_P3009}")"
          REMOTE_SCRIPT_Q="$(quote "${REMOTE_SCRIPT}")"
          REMOTE_ARCHIVE_Q="$(quote "${REMOTE_ARCHIVE}")"
          RELEASE_ID_Q="$(quote "${RELEASE_ID}")"

          ssh -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" \
            "DEPLOY_PATH=${DEPLOY_PATH_Q} \
             DEPLOY_ENV_FILE_PATH=${DEPLOY_ENV_FILE_PATH_Q} \
             COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME_Q} \
             HEALTHCHECK_URL=${HEALTHCHECK_URL_Q} \
             RELEASES_TO_KEEP=${RELEASES_TO_KEEP_Q} \
             AUTO_RESET_DB_ON_P3009=${AUTO_RESET_DB_ON_P3009_Q} \
             bash ${REMOTE_SCRIPT_Q} ${REMOTE_ARCHIVE_Q} ${RELEASE_ID_Q}"
